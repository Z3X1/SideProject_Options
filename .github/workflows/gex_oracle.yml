name: GEX Oracle Auto (每6h)

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run'
        required: false
        default: 'false'

concurrency:
  group: gex-oracle
  cancel-in-progress: false

jobs:
  oracle-update:
    name: GEX Oracle 自動快照
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run GEX Oracle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python gex_oracle_auto.py

      - name: Commit and push results
        run: |
          git config user.name "GEX Oracle Bot"
          git config user.email "oracle@gex.auto"
          git add docs/ data/ || true
          git diff --staged --quiet || git commit -m "auto: oracle snapshot $(date -u +%Y%m%d-%H%M)"
          git push
